<!doctype html>
<!-- hara-video seed: 口播竖屏 1080×1920. Copy me, replace [REPLACE] marks, bind scenes to the timeline.
     Layers: bg (slow drift gradient) → content scenes → caption slot (bottom-safe). -->
<html>
<head><meta charset="utf-8">
<style>
  :root{
    --bg0:#0b0d12; --bg1:#141a26;         /* [REPLACE] background pair */
    --ink:#f2f4f8; --accent:#5b8cff;      /* [REPLACE] text + accent   */
    --font-sans:"PingFang SC","Source Han Sans SC","Noto Sans SC",sans-serif;
  }
  *{margin:0;box-sizing:border-box}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden;background:linear-gradient(160deg,var(--bg0),var(--bg1));font-family:var(--font-sans);color:var(--ink)}
  .bgdrift{position:absolute;inset:-10%;background:radial-gradient(60% 40% at 30% 20%,rgba(91,140,255,.18),transparent 70%)}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 96px;opacity:0}
  .hook{font-size:104px;font-weight:800;line-height:1.25;letter-spacing:.01em}
  .hook em{color:var(--accent);font-style:normal}
  .body-line{font-size:64px;font-weight:600;line-height:1.4;margin-top:24px}
  .kicker{font-size:40px;opacity:.65;margin-bottom:28px}
  /* caption slot — keep bottom 12% free of it; captions render here */
  #captions{position:absolute;left:64px;right:64px;bottom:280px;text-align:center;font-size:56px;font-weight:700;-webkit-text-stroke:1px rgba(0,0,0,.85)}
</style></head>
<body>
<div id="stage" data-composition-id="koubo" data-start="0" data-width="1080" data-height="1920">
  <div class="bgdrift" id="bg"></div>

  <section class="scene" id="s1">
    <div class="kicker">[REPLACE] 栏目名 · 期数</div>
    <h1 class="hook">[REPLACE] 钩子一句话,<em>关键词</em>高亮</h1>
  </section>
  <section class="scene" id="s2">
    <p class="body-line">[REPLACE] 事实一</p>
    <p class="body-line">[REPLACE] 事实二</p>
  </section>
  <section class="scene" id="s3">
    <h1 class="hook">[REPLACE] 转折/结论 + <em>CTA</em></h1>
  </section>

  <div id="captions"><!-- caption component mounts here --></div>

  <!-- voice track: replace src, set data-duration to audio length -->
  <audio id="vo" data-start="0" data-duration="30" data-track-index="0" src="assets/voice.wav"></audio>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.to("#bg", { xPercent: 4, yPercent: -3, duration: 30, ease: "none" }, 0);
    // [REPLACE] scene timings — align to the transcript (Stage 3 JSON)
    tl.to("#s1", { opacity: 1, duration: 0.4 }, 0)
      .to("#s1", { opacity: 0, duration: 0.3 }, 6)
      .to("#s2", { opacity: 1, y: 0, duration: 0.4 }, 6.2)
      .to("#s2", { opacity: 0, duration: 0.3 }, 20)
      .to("#s3", { opacity: 1, duration: 0.4 }, 20.3);
    tl.set({}, {}, 30); // composition duration sentinel = audio length
    window.__timelines["koubo"] = tl;
  </script>
</div>
</body></html>
