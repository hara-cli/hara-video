<!doctype html>
<!-- hara-video seed: 产品 promo 竖屏 1080×1920. 痛点→亮相→3卖点→CTA,转场卡拍. -->
<html>
<head><meta charset="utf-8">
<style>
  :root{
    --bg:#08090c; --ink:#ffffff; --accent:#22d3aa;   /* [REPLACE] brand tokens */
    /* Noto Sans SC is resolved deterministically by HyperFrames across render workers. */
    --font-sans:"Noto Sans SC",sans-serif;
  }
  *{margin:0;box-sizing:border-box}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden;background:var(--bg);font-family:var(--font-sans);color:var(--ink)}
  .card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 90px;opacity:0}
  .slogan{font-size:112px;font-weight:900;line-height:1.2}
  .slogan em{color:var(--accent);font-style:normal}
  .point{font-size:88px;font-weight:800}
  .sub{font-size:44px;opacity:.7;margin-top:20px}
  .shot{position:absolute;left:90px;right:90px;top:1050px;height:560px;border-radius:24px;overflow:hidden;box-shadow:0 40px 120px -40px rgba(0,0,0,.8)}
  .shot video,.shot img{width:100%;height:100%;object-fit:cover}
  .logo{font-size:56px;font-weight:900;letter-spacing:.06em}
</style></head>
<body>
<div id="stage" data-composition-id="promo" data-start="0" data-duration="30" data-width="1080" data-height="1920">
  <section class="card clip" id="pain" data-start="0" data-duration="4" data-visual-role="problem-metaphor" data-motion="kinetic-slam"><h1 class="slogan">[REPLACE] 痛点一句话?</h1></section>
  <section class="card clip" id="reveal" data-start="4" data-duration="4" data-visual-role="product-reveal" data-motion="reveal-mask"><h1 class="slogan"><em>[REPLACE] 产品名</em></h1><p class="sub">[REPLACE] 一句定位</p></section>
  <section class="card clip" id="p1" data-start="8" data-duration="6" data-visual-role="product-footage" data-motion="push-focus"><h2 class="point">[REPLACE] 卖点一</h2>
    <div class="shot"><img id="shot1" class="clip" data-start="8" data-duration="5" data-track-index="1" src="assets/shot1.png"></div>
  </section>
  <section class="card clip" id="p2" data-start="14" data-duration="5" data-visual-role="ui-demo" data-motion="compare-split"><h2 class="point">[REPLACE] 卖点二 + UI/演示</h2></section>
  <section class="card clip" id="p3" data-start="19" data-duration="5" data-visual-role="proof-data" data-motion="count-up"><h2 class="point">[REPLACE] 卖点三 + 证据</h2></section>
  <section class="card clip" id="cta" data-start="24" data-duration="6" data-visual-role="brand-cta" data-motion="editorial-cut"><div class="logo">[REPLACE] LOGO</div><p class="sub">[REPLACE] CTA 一句话</p></section>

  <audio id="bgm" data-audio-role="music" data-start="0" data-duration="30" data-track-index="2" data-volume="0.6" src="assets/audio/bgm.mp3"></audio>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    const beat = (el, at, dur) => tl.fromTo(el, { opacity: 0, scale: .94 }, { opacity: 1, scale: 1, duration: .35 }, at)
                                    .to(el, { opacity: 0, duration: .25 }, at + dur - .25);
    // [REPLACE] 对齐 BGM 拍点
    beat("#pain", 0, 4); beat("#reveal", 4, 4); beat("#p1", 8, 6); beat("#p2", 14, 5); beat("#p3", 19, 5);
    tl.fromTo("#cta", { opacity: 0 }, { opacity: 1, duration: .4 }, 24.2);
    tl.set({}, {}, 30);
    window.__timelines["promo"] = tl;
  </script>
</div>
</body></html>
