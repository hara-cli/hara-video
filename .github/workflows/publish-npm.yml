name: publish-npm

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Validate release metadata
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const plugin = JSON.parse(readFileSync("plugin.json", "utf8"));
          if (pkg.version !== plugin.version) {
            throw new Error(`package.json (${pkg.version}) != plugin.json (${plugin.version})`);
          }
          const tag = process.env.GITHUB_REF?.startsWith("refs/tags/")
            ? process.env.GITHUB_REF.slice("refs/tags/".length)
            : null;
          if (tag && tag !== `v${pkg.version}`) {
            throw new Error(`tag (${tag}) != package version (v${pkg.version})`);
          }
          console.log(`release metadata OK: ${pkg.name}@${pkg.version}${tag ? ` / ${tag}` : ""}`);
          NODE
      - run: npm test
      - run: npm pack --dry-run

  publish:
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/
      - name: Publish to npm (idempotent)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          out=$(npm publish --registry https://registry.npmjs.org/ 2>&1); code=$?
          echo "$out"
          if [ $code -eq 0 ]; then echo "✓ published"; exit 0; fi
          if echo "$out" | grep -qiE "cannot publish over|previously published|EPUBLISHCONFLICT|409 Conflict"; then
            echo "✓ auth OK — this version is already on npm; nothing to publish"; exit 0
          fi
          echo "✗ publish failed (auth or other error above)"; exit 1
